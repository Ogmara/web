<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <!--
    Content-Security-Policy (audit 2026-06-07 B4.6/W3). The web app talks to
    user-configurable nodes / IPFS gateways / the push gateway over TLS, so
    connect/img/media allow `https:`+`wss:` (NOT plaintext http/ws — matches the
    SSRF + host-binding fixes). `script-src 'self'` blocks injected/inline
    scripts (XSS defense — the Vite build emits only external module scripts);
    `style-src` keeps 'unsafe-inline' for injected styles; `object-src 'none'`.
  -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; media-src 'self' blob: https:; connect-src 'self' https: wss:; font-src 'self' data:; object-src 'none'; base-uri 'self'" />
  <meta name="viewport" content="width=device-width, initial-scale=1, interactive-widget=resizes-content" />
  <meta name="description" content="Ogmara — Decentralized chat and news on Klever blockchain" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="icon" type="image/svg+xml" href="/app/favicon.svg" />
  <link rel="apple-touch-icon" href="/app/icon-512.png" />
  <link rel="manifest" href="/app/manifest.json" />
  <title>Ogmara</title>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/index.tsx"></script>
  <script>
    if ('serviceWorker' in navigator) {
      var isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
      if (isLocal) {
        // Dev mode: unregister any stale SW that would intercept HMR/module requests
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(r) { r.unregister(); });
        });
      } else {
        navigator.serviceWorker.register('/app/sw.js').catch(function() {});
      }
    }
  </script>
</body>
</html>
